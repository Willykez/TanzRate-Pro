name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # FIXED: Forcing Gradle 8.4 ensures absolute compatibility with your project's AGP 8.2.2 tools
      - name: Regenerate Missing Gradle Wrapper Jar
        run: gradle wrapper --gradle-version 8.4

      - name: Create local.properties placeholder
        run: |
          echo "EXCHANGE_API_KEY=${{ secrets.EXCHANGE_API_KEY || 'dummy_key' }}" > local.properties
          echo "METAL_API_KEY=${{ secrets.METAL_API_KEY || 'dummy_key' }}" >> local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TanzRate-Pro-v2.3.0-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create release notes
        run: |
          echo "## TanzRate Pro v2.3.0 - Debug Build" > release_notes.md
          echo "" >> release_notes.md
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> release_notes.md
          echo "**Commit:** ${{ github.sha }}" >> release_notes.md
          echo "**Branch:** ${{ github.ref_name }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "This is a debug build. Use only for testing and development purposes." >> release_notes.md

      - name: Display APK info
        run: |
          ls -lh app/build/outputs/apk/debug/ || echo "APK file not found in default path"
          echo ""
          echo "✅ Debug APK successfully built!"
          echo "📦 APK available in workflow artifacts"
