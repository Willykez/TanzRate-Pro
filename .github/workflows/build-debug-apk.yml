name: Build Debug APK — TanzRate Pro v4.0.0

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Regenerate Gradle Wrapper Jar
        run: gradle wrapper --gradle-version 8.4

      - name: Create local.properties
        run: |
          echo "EXCHANGE_API_KEY=${{ secrets.EXCHANGE_API_KEY }}" > local.properties
          echo "METAL_API_KEY=${{ secrets.METAL_API_KEY }}" >> local.properties

      - name: Force minSdk to 26 (adaptive-icon requirement)
        run: |
          sed -i 's/minSdk [0-9]*/minSdk 26/g' app/build.gradle || true
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 26/g' app/build.gradle || true

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TanzRate-Pro-v4.0.0-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## TanzRate Pro v4.0.0 Debug Build" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/ || true
          echo "✅ Debug APK built successfully"
